name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio/**'
      - '.github/workflows/frontend.yml'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/anti-pf-frontend:latest \
            ./portfolio

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/anti-pf-frontend:latest

      - name: Install OpenShift CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        id: openshift_login
        continue-on-error: true
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ secrets.OPENSHIFT_SERVER }}

      - name: Select project
        if: steps.openshift_login.outcome == 'success'
        run: |
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Restart deployment
        if: steps.openshift_login.outcome == 'success'
        run: |
          oc rollout restart deployment/anti-pf-frontend

      - name: Warn if OpenShift login failed
        if: steps.openshift_login.outcome != 'success'
        run: |
          echo "::warning::OpenShift login failed. OPENSHIFT_TOKEN may be invalid or expired; image was still built and pushed."
